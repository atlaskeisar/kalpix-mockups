<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Cannon</title><link rel="stylesheet" href="shared.css"><style>:root{--ring:#ffe66d;--ring-bg:#ffffff33;--ring-core:#111;--ring-ink:#ffe66d}body{background:#0b1020}.phone{background:radial-gradient(circle at 50% 18%,#2dd4bf44,transparent 34%),linear-gradient(180deg,#111827,#050816);color:white}.deck{position:absolute;inset:90px 18px 95px}.card{position:absolute;inset:0;background:#fff;color:#111;border-radius:34px;padding:24px;box-shadow:0 25px 0 #0006,0 45px 90px #0008;display:flex;flex-direction:column;justify-content:space-between;transition:.42s cubic-bezier(.2,1,.2,1);overflow:hidden}.card:before{content:'KALPIX';position:absolute;left:-28px;top:42px;font-size:66px;font-weight:1000;color:#00000008;transform:rotate(-90deg)}.card.fire{transform:translateY(-120vh) rotate(-18deg);opacity:.2}.answers button{background:#111827;color:white;border-radius:22px;padding:16px;text-align:right}.answers button:nth-child(2){background:#0f766e}.answers button:nth-child(3){background:#be123c}.answers button:nth-child(4){background:#7c3aed}.result{position:absolute;inset:90px 18px 95px;background:#111;color:white;border:2px solid #ffe66d;border-radius:34px;padding:22px;display:none}.result.show{display:block}.bar{margin:14px 0}.bar label{display:flex;justify-content:space-between;font-weight:1000}.bar i{display:block;height:24px;background:#ffffff22;border-radius:99px;overflow:hidden}.bar em{display:block;height:100%;background:#ffe66d}.count-ring{margin:24px auto}.nav{background:#ffffff14;backdrop-filter:blur(20px)}.nav button{background:transparent;color:#ffffff88}.nav .on{background:white;color:#111}.pill{background:#ffe66d;color:#111}</style></head><body><div class="phone"><div class="top"><div class="brand">Card Cannon</div><div class="pill">מחסנית 6</div></div><div class="deck holdable"><section class="card"></section><section class="result"></section></div><div class="burst"></div><nav class="nav"><button class="on">פיד</button><button>ליגה</button><button>בנייה</button><button>אני</button></nav></div><script src="shared.js"></script><script>function draw(){const p=poll();$('.result').classList.remove('show');$('.card').className='card';$('.card').innerHTML=`<div><div class="pill" style="display:inline-block">ענה וירה</div><h1 class="poll-title">${p[0]}</h1></div><div class="answers">${p[1].map((a,k)=>`<button data-a="${k}">${a}</button>`).join('')}</div>`;$$('[data-a]').forEach(b=>b.onclick=()=>{vibe();coins(14);$('.card').classList.add('fire');setTimeout(()=>show(),250)})}function show(){const p=poll();$('.result').innerHTML=`<h1 class="poll-title">פיצוץ תוצאה קצר</h1>${p[1].map((a,k)=>`<div class="bar"><label><span>${a}</span><b>${p[2][k]}%</b></label><i><em style="width:${p[2][k]}%"></em></i></div>`).join('')}<div class="count-ring"><b>3</b></div>`;$('.result').classList.add('show');start(draw)}draw()</script></body></html>
