<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tag Monster</title><link rel="stylesheet" href="shared.css"><style>:root{--ring:#a3e635;--ring-bg:#ffffff44;--ring-core:#3b0764;--ring-ink:#a3e635}.phone{background:linear-gradient(#fef3c7,#fbcfe8);color:#3b0764}.monster{position:absolute;top:82px;left:50%;transform:translateX(-50%);width:190px;height:170px;background:#a3e635;border:5px solid #3b0764;border-radius:48% 52% 44% 56%;box-shadow:8px 10px 0 #3b0764}.monster:before,.monster:after{content:'';position:absolute;top:48px;width:32px;height:32px;background:#3b0764;border-radius:50%}.monster:before{right:45px}.monster:after{left:45px}.mouth{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);width:72px;height:28px;background:#3b0764;border-radius:0 0 40px 40px}.monster.feed{animation:feed .45s}.panel{position:absolute;left:18px;right:18px;bottom:100px;background:white;border:4px solid #3b0764;border-radius:34px;padding:18px;box-shadow:8px 8px 0 #3b0764}.answers{grid-template-columns:1fr 1fr}.answers button{background:#fef3c7;color:#3b0764;border:3px solid #3b0764;border-radius:22px;padding:14px;font-weight:1000}.result{display:none}.answered .question{display:none}.answered .result{display:block}.feedtxt{background:#a3e635;border:3px solid #3b0764;border-radius:22px;padding:11px;font-weight:1000;margin-bottom:10px}.bar{margin:9px 0}.bar label{display:flex;justify-content:space-between;font-weight:900}.bar i{display:block;height:17px;background:#f3e8ff;border-radius:99px;overflow:hidden}.bar em{display:block;height:100%;background:#a3e635}.count-ring{margin:12px auto 0}.pill{background:#3b0764;color:#a3e635}.nav{background:white;border:3px solid #3b0764}.nav button{color:#3b076499;background:transparent}.nav .on{background:#3b0764;color:#a3e635}@keyframes feed{50%{transform:translateX(-50%) scale(1.18) rotate(-3deg)}}</style></head><body><div class="phone"><div class="top"><div class="brand">Tag Monster</div><div class="pill">תג חי 4/5</div></div><div class="monster"><div class="mouth"></div></div><main class="panel holdable"><div class="question"></div><div class="result"></div></main><div class="burst"></div><nav class="nav"><button class="on">פיד</button><button>ליגה</button><button>בנייה</button><button>אני</button></nav></div><script src="shared.js"></script><script>function draw(){document.body.classList.remove('answered');const p=poll();$('.question').innerHTML=`<h1 class="poll-title">${p[0]}</h1><div class="answers">${p[1].map((a,k)=>`<button data-a="${k}">${a}</button>`).join('')}</div>`;$$('[data-a]').forEach(b=>b.onclick=()=>{vibe();coins(16);$('.monster').classList.add('feed');setTimeout(()=>$('.monster').classList.remove('feed'),500);document.body.classList.add('answered');show()})}function show(){const p=poll();$('.result').innerHTML=`<div class="feedtxt">האכלת תג · רצף סקרים 12 · +8 coins</div>${p[1].map((a,k)=>`<div class="bar"><label><span>${a}</span><b>${p[2][k]}%</b></label><i><em style="width:${p[2][k]}%"></em></i></div>`).join('')}<div class="count-ring"><b>3</b></div>`;start(draw)}draw()</script></body></html>
