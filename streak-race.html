<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Streak Race</title><link rel="stylesheet" href="shared.css"><style>:root{--ring:#39ff14;--ring-bg:#1f2937;--ring-core:#06110a;--ring-ink:#39ff14}.phone{background:#07130b;color:white}.track{position:absolute;inset:72px 18px 92px;background:linear-gradient(90deg,#1f2937 0 49%,#111827 49% 51%,#1f2937 51%);border-radius:32px;overflow:hidden;border:2px solid #39ff1444}.road{position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0 45px,#ffffff18 45px 70px);animation:road 1.4s linear infinite}.car{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:58px;filter:drop-shadow(0 12px 20px #000)}.panel{position:absolute;left:16px;right:16px;bottom:112px;background:#f8ffe8;color:#07130b;border-radius:28px;padding:18px;box-shadow:0 16px 40px #0008}.answers{grid-template-columns:1fr 1fr}.answers button{padding:14px;border-radius:18px;background:#07130b;color:white}.result{display:none}.answered .question{display:none}.answered .result{display:block}.boost{font-weight:1000;background:#39ff14;border-radius:18px;padding:11px;text-align:center;margin-bottom:10px}.bar{margin:9px 0}.bar label{display:flex;justify-content:space-between;font-weight:900}.bar i{display:block;height:16px;background:#d8e8ce;border-radius:99px}.bar em{display:block;height:100%;background:#16a34a}.count-ring{margin:12px auto 0}.pill{background:#39ff14;color:#07130b}.nav{background:#0c1a10}.nav button{color:#fff7;background:transparent}.nav .on{background:#39ff14;color:#07130b}@keyframes road{to{background-position:0 70px}}</style></head><body><div class="phone"><div class="top"><div class="brand">Streak Race</div><div class="pill">Lap 6</div></div><main class="track holdable"><div class="road"></div><div class="car">🏎️</div><section class="panel"><div class="question"></div><div class="result"></div></section></main><div class="burst"></div><nav class="nav"><button class="on">פיד</button><button>ליגה</button><button>בנייה</button><button>אני</button></nav></div><script src="shared.js"></script><script>function draw(){document.body.classList.remove('answered');const p=poll();$('.question').innerHTML=`<h1 class="poll-title">${p[0]}</h1><div class="answers">${p[1].map((a,k)=>`<button data-a="${k}">${a}</button>`).join('')}</div>`;$$('[data-a]').forEach(b=>b.onclick=()=>{vibe();coins(12);$('.car').classList.add('pop');setTimeout(()=>$('.car').classList.remove('pop'),300);document.body.classList.add('answered');show()})}function show(){const p=poll();$('.result').innerHTML=`<div class="boost">BOOST + streak engine</div>${p[1].map((a,k)=>`<div class="bar"><label><span>${a}</span><b>${p[2][k]}%</b></label><i><em style="width:${p[2][k]}%"></em></i></div>`).join('')}<div class="count-ring"><b>3</b></div>`;start(draw)}draw()</script></body></html>
