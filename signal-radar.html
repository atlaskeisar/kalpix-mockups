<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signal Radar</title><link rel="stylesheet" href="shared.css"><style>:root{--ring:#00f5ff;--ring-bg:#00333a;--ring-core:#001114;--ring-ink:#00f5ff}.phone{background:#001114;color:#dffcff}.radar{position:absolute;inset:82px 20px 94px;border:1px solid #00f5ff55;border-radius:50%;background:radial-gradient(circle,#00f5ff11 0 1px,transparent 2px),radial-gradient(circle,#00f5ff0d 0 24%,transparent 25% 49%,#00f5ff0d 50% 51%,transparent 52%);overflow:hidden}.radar:before{content:'';position:absolute;inset:50% 50% 0 0;background:linear-gradient(45deg,#00f5ff99,transparent 60%);transform-origin:100% 0;animation:spin 2.2s linear infinite}.panel{position:absolute;left:18px;right:18px;bottom:106px;background:#dffcff;color:#001114;border-radius:26px;padding:18px;box-shadow:0 0 40px #00f5ff66}.answers button{background:#001114;color:#dffcff;border-radius:18px;padding:14px;text-align:right}.result{display:none}.answered .question{display:none}.answered .result{display:block}.ping{font-weight:1000;color:#00a6b2;margin-bottom:10px}.bar{margin:9px 0}.bar label{display:flex;justify-content:space-between;font-weight:900}.bar i{display:block;height:16px;background:#b8edf0;border-radius:99px;overflow:hidden}.bar em{display:block;height:100%;background:#00a6b2}.count-ring{margin:12px auto 0}.pill{background:#00f5ff;color:#001114}.nav{background:#00252a}.nav button{color:#dffcff99;background:transparent}.nav .on{background:#00f5ff;color:#001114}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div class="phone"><div class="top"><div class="brand">Signal Radar</div><div class="pill">scan</div></div><div class="radar"></div><main class="panel holdable"><div class="question"></div><div class="result"></div></main><div class="burst"></div><nav class="nav"><button class="on">פיד</button><button>ליגה</button><button>בנייה</button><button>אני</button></nav></div><script src="shared.js"></script><script>function draw(){document.body.classList.remove('answered');const p=poll();$('.question').innerHTML=`<div class="ping">אות חדש נקלט</div><h1 class="poll-title">${p[0]}</h1><div class="answers">${p[1].map((a,k)=>`<button data-a="${k}">${a}</button>`).join('')}</div>`;$$('[data-a]').forEach(b=>b.onclick=()=>{vibe();coins(10);$('.phone').classList.add('shake');setTimeout(()=>$('.phone').classList.remove('shake'),300);document.body.classList.add('answered');show()})}function show(){const p=poll();$('.result').innerHTML=`<div class="ping">Pulse revealed · +8 coins</div>${p[1].map((a,k)=>`<div class="bar"><label><span>${a}</span><b>${p[2][k]}%</b></label><i><em style="width:${p[2][k]}%"></em></i></div>`).join('')}<div class="count-ring"><b>3</b></div>`;start(draw)}draw()</script></body></html>
