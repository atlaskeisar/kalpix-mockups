<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crowd Arena</title><link rel="stylesheet" href="shared.css"><style>:root{--ring:#ff3d81;--ring-bg:#ffffff30;--ring-core:#fff;--ring-ink:#111}.phone{background:linear-gradient(#1a0b2e,#07020d);color:white}.arena{position:absolute;inset:78px 0 90px;display:grid;grid-template-rows:1fr auto}.crowd{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;padding:0 14px;align-content:end}.dot{height:18px;border-radius:6px;background:#ffffff22}.dot.hot{background:#ff3d81;box-shadow:0 0 18px #ff3d81}.stage{margin:0 18px 14px;background:#fff;color:#111;border-radius:32px;padding:22px;box-shadow:0 0 0 6px #ff3d81,0 28px 70px #000}.answers{grid-template-columns:1fr 1fr}.answers button{border-radius:24px;padding:18px;background:#111;color:white}.answers button:nth-child(2){background:#ff3d81}.answers button:nth-child(3){background:#facc15;color:#111}.answers button:nth-child(4){background:#22c55e}.result{display:none}.answered .question{display:none}.answered .result{display:block}.bar{height:42px;background:#eee;border-radius:18px;margin:10px 0;overflow:hidden;position:relative}.bar em{display:block;height:100%;background:#ff3d81}.bar b{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px}.count-ring{margin:14px auto 0}.pill{background:#ff3d81;color:white}.nav{background:#16051f}.nav button{color:#fff8;background:transparent}.nav .on{background:#ff3d81;color:white}</style></head><body><div class="phone"><div class="top"><div class="brand">Crowd Arena</div><div class="pill">קהל חי</div></div><main class="arena holdable"><div class="crowd"></div><section class="stage"><div class="question"></div><div class="result"></div></section></main><div class="burst"></div><nav class="nav"><button class="on">פיד</button><button>ליגה</button><button>בנייה</button><button>אני</button></nav></div><script src="shared.js"></script><script>function crowd(hot=12){$('.crowd').innerHTML=Array.from({length:120},(_,k)=>`<i class="dot ${k%Math.max(1,Math.floor(120/hot))===0?'hot':''}"></i>`).join('')}function draw(){document.body.classList.remove('answered');crowd(10);const p=poll();$('.question').innerHTML=`<h1 class="poll-title">${p[0]}</h1><div class="answers">${p[1].map((a,k)=>`<button data-a="${k}">${a}</button>`).join('')}</div>`;$$('[data-a]').forEach(b=>b.onclick=()=>{vibe();coins(20);crowd(48);document.body.classList.add('answered');show()})}function show(){const p=poll();$('.result').innerHTML=`${p[1].map((a,k)=>`<div class="bar"><em style="width:${p[2][k]}%"></em><b><span>${a}</span><span>${p[2][k]}%</span></b></div>`).join('')}<div class="count-ring"><b>3</b></div>`;start(draw)}draw()</script></body></html>
